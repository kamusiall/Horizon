name: Daily Horizon Summary

on:
  schedule:
    - cron: '0 5 */2 * *'   # every 2 days, 05:00 UTC (~06:00 CET / ~07:00 CEST)
  workflow_dispatch:      # Allow manual trigger

jobs:
  daily-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to push to gh-pages (peaceiris); least privilege

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false  # don't leave GITHUB_TOKEN in runner .git config

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39  # v3

      - name: Install dependencies
        run: uv sync --locked  # install exactly the pinned uv.lock versions; fail on drift

      - name: Prepare GitHub Actions config
        run: cp data/config.github.json data/config.json

      - name: Run Horizon
        env:
          # Map secrets to environment variables expected by config.json.
          # ai.api_key_env in data/config.github.json is OPENROUTER_API_KEY.
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          LWN_KEY: ${{ secrets.LWN_KEY }}
        run: uv run horizon --hours 48

      - name: Set current date as environment variable
        run: echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453  # v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          keep_files: true  # Keep existing summaries on gh-pages branch
          commit_message: "📝 Daily Summary: ${{ env.DATE }}"
          publish_branch: gh-pages
          enable_jekyll: true
