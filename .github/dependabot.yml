version: 2
updates:
  # GitHub Actions: surface action updates as reviewable PRs (we pin to SHAs).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Python deps managed by uv (pyproject.toml + uv.lock).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
